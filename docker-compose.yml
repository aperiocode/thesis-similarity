services:
  similarity-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: skripsi-similarity-api
    restart: unless-stopped
    ports:
      - "8181:7860"

    environment:
      PORT: "7860"
      DATABASE_URL: "sqlite+aiosqlite:////data/skripsi.db"
      CHROMA_DB_PATH: "/data/chroma_db"
      COLLECTION_NAME: "skripsi_embeddings"
      MODEL_NAME: "paraphrase-multilingual-MiniLM-L12-v2"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HOME: "/data/.huggingface"
      ALLOWED_ORIGINS: "http://localhost:8000"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      TOKENIZERS_PARALLELISM: "false"
      INFERENCE_CONCURRENCY: "2"
      LOG_LEVEL: "INFO"
      SYNC_SECRET: "${SYNC_SECRET}"

    volumes:
      - similarity_data:/data

    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  similarity_data:
    driver: local
